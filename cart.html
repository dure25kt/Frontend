<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cart - Viva Skyn</title>
    <link rel="stylesheet" href="css/main.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header class="container">
      <nav class="nav">
        <a href="index.html" class="logo">
          <img src="img/vivaskinnlogobakgrund.jpg" alt="Logo" />
        </a>

        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="products.html">Products</a></li>
          <li class="cart-icon">
            <a href="cart.html">
              <svg
                class="w-[24px] h-[24px] text-gray-800 dark:text-white"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="none"
                viewBox="0 0 24 24"
              >
                <path
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M5 4h1.5L9 16m0 0h8m-8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm-8.5-3h9.25L19 7H7.312"
                />
              </svg>
              <span id="cart-count">0</span>
            </a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="container cart-page">
      <h1>Your Cart</h1>
      <p>Add items from the Products page to see them here</p>
      <div id="cartItems"></div>

      <div class="cart-total">
        <h2>Total: <span id="cartTotal">0</span> SEK</h2>
        <a href="checkout.html" class="checkout-btn">Proceed to Checkout</a>
      </div>

      <div id="cartItems"></div>
    </main>

    <footer class="footer">
      <div class="footer-section">
        <h3>Viva Skyn</h3>
        <p>Skincare for all types of skin.</p>
      </div>
      <div class="footer-section">
        <h4>Shop</h4>
        <ul>
          <li><a href="products.html">Products</a></li>
          <li><a href="cart.html">Cart</a></li>
        </ul>
      </div>
      <div class="footer-section">
        <h4>Contact</h4>
        <p>Email: info@vivaskyn.com</p>
        <p>Instagram: @Vivaskyn</p>
      </div>
      <div class="footer-bottom">© Viva Skyn 2026</div>
    </footer>
    <script src="js/script.js"></script>
  </body>
</html>

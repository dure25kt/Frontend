<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cart - Viva Skyn</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body>
    <header class="container">
      <nav class="nav">
        <a href="index.html" class="logo">
          <img src="img/vivaskinnlogobakgrund.jpg" alt="Logo" />
        </a>

        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="products.html">Products</a></li>
          <li><a href="cart.html">Cart</a></li>
        </ul>
      </nav>
    </header>

    <main class="conainer">
      <h1>Your Cart</h1>
      <p>Add items from the Products page to see them here</p>
    </main>

    <div id="cartSidebar" class="cart-sidebar">
      <button id="cartSidebar" class="cart-sidebar">
        <h2>Your Cart</h2>
        <div class="cart-items"></div>

        <div class="cart-item">
          <strong>Total: </strong> <span id="totalAmount">0 SEK</span>
        </div>
        <button id="checkoutBtn"></button>
      </button>
    </div>

    <main class="container cart-page">
      <h1>Your Cart</h1>

      <div class="cart-item">
        <img src="img/croppad1krämviva.png" alt="Viva Cream" />
        <div>
          <h3>Viva Cream</h3>
          <p>99 SEK</p>
        </div>
      </div>

      <div class="cart-item">
        <img src="img/serumcroppad.png" alt="Skyncredible Drops" />
        <div>
          <h3>Skyncredible Drops</h3>
          <p>249 SEK</p>
        </div>
      </div>

      <div class="cart-total">
        <h2>Total: 348 SEK</h2>
        <a href="checkout.html" class="checkout-btn">Proceed to Checkout</a>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-section">
        <h3>Viva Skyn</h3>
        <p>Skincare for all types of skin.</p>
      </div>
    </footer>
  </body>
</html>
